<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />

    <script>
      (function() {
        try {
          var theme = localStorage.getItem('magister-theme') || 'system';
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          
          // Determine the correct color FIRST
          var bgColor = isDark ? '#020617' : '#f8fafc';
          
          // 1. Synchronously inject the meta tag so the OS never sees white
          document.write('<meta id="theme-color-meta" name="theme-color" content="' + bgColor + '" />');
          
          // 2. Paint the DOM
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.body.style.backgroundColor = '#020617'; 
          } else {
            document.documentElement.classList.remove('dark');
            document.body.style.backgroundColor = '#f8fafc';
          }
        } catch (e) {}
      })();
    </script>
    <meta name="description" content="Master your curriculum with Magister OS" />
    
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <title>Magister OS</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Magister OS" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    
    <style>
      #root {
        width: 100%;
        height: 100%;
      }
    </style>
    
        <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              // 1. THE ACCENT PALETTE (Buttons, Icons, Highlights)
              indigo: {
                50: 'rgb(var(--theme-primary-50) / <alpha-value>)',
                100: 'rgb(var(--theme-primary-100) / <alpha-value>)',
                200: 'rgb(var(--theme-primary-200) / <alpha-value>)',
                300: 'rgb(var(--theme-primary-300) / <alpha-value>)',
                400: 'rgb(var(--theme-primary-400) / <alpha-value>)',
                500: 'rgb(var(--theme-primary-500) / <alpha-value>)',
                600: 'rgb(var(--theme-primary-600) / <alpha-value>)',
                900: 'rgb(var(--theme-primary-900) / <alpha-value>)',
                950: 'rgb(var(--theme-primary-950) / <alpha-value>)',
              },
              // 2. THE STRUCTURAL PALETTE (Backgrounds, Borders, Panels)
              slate: {
                50: 'rgb(var(--theme-neutral-50) / <alpha-value>)',
                100: 'rgb(var(--theme-neutral-100) / <alpha-value>)',
                200: 'rgb(var(--theme-neutral-200) / <alpha-value>)',
                300: 'rgb(var(--theme-neutral-300) / <alpha-value>)',
                400: 'rgb(var(--theme-neutral-400) / <alpha-value>)',
                500: 'rgb(var(--theme-neutral-500) / <alpha-value>)',
                600: 'rgb(var(--theme-neutral-600) / <alpha-value>)',
                700: 'rgb(var(--theme-neutral-700) / <alpha-value>)',
                800: 'rgb(var(--theme-neutral-800) / <alpha-value>)',
                900: 'rgb(var(--theme-neutral-900) / <alpha-value>)',
                950: 'rgb(var(--theme-neutral-950) / <alpha-value>)',
              }
            }
          }
        }
      }
    </script>

    
    <style>
      /* Mobile safe area fix */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    
    <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
        "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
        "vite": "https://aistudiocdn.com/vite@^7.2.4",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
      }
    }
    </script>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
